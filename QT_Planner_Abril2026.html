<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner QT · Abril 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #1e3220; --verde-m: #2d4a2d; --verde-l: #537056;
  --dorado: #c9a84c; --dorado-l: #e2c97e;
  --crema: #f5f0e8; --arena: #becbbf; --terracota: #b36b4b;
  --texto: #1a2e1a; --gris: #7a8e7a; --blanco: #ffffff;
  --aloj: #2d4a2d; --evento: #7a3a1a; --day: #3a5a2a; --story: #1a2e5a; --reel: #7a5a1a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { font-family:'Jost',sans-serif; background:var(--crema); color:var(--texto); display:flex; flex-direction:column; }

/* TOP BAR */
.topbar { background:var(--verde); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.tb-brand { font-family:'Cormorant Garamond',serif; color:var(--dorado); font-size:22px; font-weight:300; font-style:italic; }
.tb-nav { display:flex; align-items:center; gap:12px; }
.tb-mes { font-family:'Cormorant Garamond',serif; color:var(--crema); font-size:20px; font-weight:300; min-width:160px; text-align:center; }
.btn-nav { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:var(--crema); padding:6px 14px; cursor:pointer; font-family:'Jost',sans-serif; font-size:13px; border-radius:2px; transition:background .2s; }
.btn-nav:hover { background:rgba(255,255,255,.2); }
.tb-right { display:flex; align-items:center; gap:10px; }
.tb-tag { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--arena); }

/* LEYENDA */
.leyenda { background:var(--verde-m); padding:8px 28px; display:flex; gap:20px; flex-wrap:wrap; flex-shrink:0; }
.ley { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--arena); letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
.ley-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.ld-aloj { background:#6a9a6a; }
.ld-evento { background:#c07050; }
.ld-day { background:#7aaa5a; }
.ld-story { background:#7090d0; }
.ld-reel { background:var(--dorado); }
.ld-libre { background:#a0c890; }
.ld-ss { background:#d4a820; }

/* LAYOUT PRINCIPAL */
.main { display:flex; flex:1; overflow:hidden; }

/* CALENDARIO */
.cal-wrap { flex:1; overflow-y:auto; padding:20px 28px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal-header-day { text-align:center; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gris); padding:8px 0; font-weight:500; }
.dia { background:var(--blanco); border:1px solid #dde8dd; border-radius:6px; min-height:120px; cursor:pointer; transition:all .15s; overflow:hidden; position:relative; }
.dia:hover { border-color:var(--dorado); box-shadow:0 2px 8px rgba(45,74,45,.15); transform:translateY(-1px); }
.dia.selected { border-color:var(--dorado); border-width:2px; box-shadow:0 3px 12px rgba(201,168,76,.25); }
.dia.vacio { background:#f8f8f8; border-color:#ebebeb; cursor:default; }
.dia.vacio:hover { transform:none; box-shadow:none; border-color:#ebebeb; }
.dia.ocupado { background:#f8f5f2; }
.dia.disponible { background:#f0f8f0; }
.dia.ss-dia { background:#fef9ec; }
.dia.hoy { border-color:var(--verde-l); border-width:2px; }
.dia-header { padding:7px 9px 5px; display:flex; justify-content:space-between; align-items:flex-start; }
.dia-num { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; line-height:1; color:var(--texto); }
.dia.hoy .dia-num { color:var(--verde-l); font-weight:600; }
.dia-status { font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:2px 5px; border-radius:2px; font-weight:500; }
.st-libre { background:#e0f0e0; color:#2a6a2a; }
.st-ocupado { background:#f0ece8; color:#6a4a2a; }
.st-ss { background:#fef0c0; color:#7a5a10; }
.dia-piezas { padding:4px 9px 8px; display:flex; flex-direction:column; gap:3px; }
.pieza-chip { font-size:9px; padding:2px 7px; border-radius:2px; font-weight:500; letter-spacing:.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pc-aloj { background:#e0ede0; color:var(--aloj); }
.pc-evento { background:#f0e0d8; color:var(--evento); }
.pc-day { background:#e8f0e0; color:var(--day); }
.pc-story { background:#e0e8f5; color:var(--story); }
.pc-reel { background:#fdf5e0; color:var(--reel); }
.pc-ad { background:#fff0d8; color:#7a4a10; }
.pc-doc { background:#f0f0f0; color:#6a6a6a; }
.dia-mas { font-size:9px; color:var(--gris); padding:0 9px 6px; }

/* PANEL LATERAL */
.panel { width:420px; background:var(--blanco); border-left:1px solid #dde8dd; overflow-y:auto; flex-shrink:0; display:flex; flex-direction:column; transition:width .3s; }
.panel.cerrado { width:0; border:none; overflow:hidden; }
.panel-header { background:var(--verde); padding:18px 22px; flex-shrink:0; }
.ph-fecha { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--arena); margin-bottom:4px; }
.ph-titulo { font-family:'Cormorant Garamond',serif; color:var(--crema); font-size:22px; font-weight:300; }
.ph-status { font-size:10px; color:var(--dorado); margin-top:4px; }
.panel-close { float:right; background:none; border:none; color:var(--arena); font-size:20px; cursor:pointer; padding:0; line-height:1; }
.panel-body { flex:1; overflow-y:auto; }

/* TABS */
.tabs { display:flex; background:#f8faf8; border-bottom:1px solid #dde8dd; flex-shrink:0; }
.tab { flex:1; padding:10px 8px; font-size:11px; font-weight:500; text-align:center; cursor:pointer; color:var(--gris); border-bottom:2px solid transparent; transition:all .15s; letter-spacing:.5px; text-transform:uppercase; }
.tab.active { color:var(--verde-m); border-bottom-color:var(--dorado); background:var(--blanco); }
.tab-content { display:none; padding:18px 20px; }
.tab-content.active { display:block; }

/* PIEZAS EN PANEL */
.pieza-bloque { margin-bottom:20px; border:1px solid #e8ede8; border-radius:6px; overflow:hidden; }
.pb-header { padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.pb-header:hover { background:#f8faf8; }
.pb-tipo-badge { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:2px; font-weight:600; }
.pb-nombre { font-size:13px; font-weight:500; color:var(--texto); flex:1; }
.pb-hora { font-size:10px; color:var(--gris); }
.pb-arrow { font-size:12px; color:var(--gris); transition:transform .2s; }
.pb-arrow.open { transform:rotate(180deg); }
.pb-body { display:none; padding:14px 16px; background:#fafaf7; border-top:1px solid #e8ede8; }
.pb-body.open { display:block; }

/* COPY DISPLAY */
.copy-seccion { margin-bottom:14px; }
.cs-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--dorado); font-weight:500; margin-bottom:6px; }
.cs-texto { font-size:12px; line-height:1.85; color:var(--texto); font-weight:300; white-space:pre-wrap; background:var(--blanco); border:1px solid #e8ede8; border-radius:4px; padding:10px 12px; }
.cs-texto.hook { border-left:3px solid var(--verde-l); }
.cs-texto.cta-box { border-left:3px solid var(--dorado); background:#fdf8f0; }
.copy-full { font-size:12px; line-height:1.9; color:var(--texto); font-weight:300; white-space:pre-wrap; background:var(--blanco); border:1px solid #e8ede8; border-radius:4px; padding:12px 14px; }
.btn-copy { background:var(--verde-m); color:var(--crema); border:none; padding:8px 16px; font-family:'Jost',sans-serif; font-size:11px; font-weight:500; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border-radius:3px; width:100%; margin-top:10px; transition:background .15s; }
.btn-copy:hover { background:var(--verde); }
.btn-copy.copied { background:#3B6D11; }

/* STORIES */
.story-item { background:var(--blanco); border:1px solid #dde8ee; border-left:3px solid #5070c0; border-radius:4px; padding:10px 12px; margin-bottom:8px; }
.si-num { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#5070c0; font-weight:500; margin-bottom:4px; }
.si-texto { font-size:12px; color:var(--texto); line-height:1.6; font-weight:300; }
.si-nota { font-size:10px; color:var(--gris); margin-top:5px; font-style:italic; }

/* NOTAS */
.nota-diseno { background:#fdf8f0; border:1px solid #e8d090; border-radius:4px; padding:10px 12px; font-size:11px; color:#7a5c2a; line-height:1.7; margin-bottom:10px; }
.nota-diseno strong { font-weight:500; }

/* RESUMEN PANEL */
.resumen-mes { padding:18px 20px; }
.rm-stat { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:12px; }
.rm-stat:last-child { border:none; }
.rm-key { color:var(--gris); }
.rm-val { font-weight:500; color:var(--texto); }

/* ADS PANEL */
.ad-bloque { background:#fdf8f0; border:1px solid #e8d090; border-radius:6px; padding:14px 16px; margin-bottom:12px; }
.ab-nombre { font-size:13px; font-weight:500; color:var(--texto); margin-bottom:4px; }
.ab-fechas { font-size:10px; color:var(--gris); margin-bottom:8px; }
.ab-det { font-size:11px; color:#5a5a3a; line-height:1.7; }
.ab-budget { display:inline-block; background:var(--dorado); color:var(--verde); font-size:11px; font-weight:600; padding:3px 10px; border-radius:2px; margin-top:6px; }

/* FIJO SIEMPRE */
.cta-fijo { background:var(--verde); border-radius:6px; padding:14px 16px; margin-bottom:12px; }
.cf-titulo { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--dorado); margin-bottom:10px; font-weight:500; }
.cf-line { font-size:11px; color:var(--arena); line-height:1.9; font-family:'Jost',sans-serif; }
.cf-line strong { color:var(--crema); }

/* EMPTY STATE */
.empty-state { padding:40px 20px; text-align:center; color:var(--gris); }
.es-icon { font-size:32px; margin-bottom:12px; opacity:.4; }
.es-text { font-size:13px; line-height:1.6; }
</style>
</head>

// ─── ESTADO ───
let mesActual = new Date(2026, 3, 1); // Abril 2026
let diaSeleccionado = null;

// ─── NOMBRES ───
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TYPE_LABELS = { aloj:"Alojamiento", evento:"Evento", day:"DayPass", reel:"Reel", story:"Story", doc:"Documentar", ad:"Campaña" };
const TYPE_COLORS = { aloj:"#3B6D11", evento:"#7a3a1a", day:"#2d6020", reel:"#854F0B", story:"#1a2e5a", doc:"#6a6a6a", ad:"#7a4a10" };

function keyFecha(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function renderCalendario() {
  const cal = document.getElementById('calendario');
  cal.innerHTML = '';
  document.getElementById('mes-titulo').textContent = `${MESES[mesActual.getMonth()]} ${mesActual.getFullYear()}`;

  const year = mesActual.getFullYear();
  const month = mesActual.getMonth();
  const primerDia = new Date(year, month, 1).getDay();
  const offset = primerDia === 0 ? 6 : primerDia - 1;
  const diasMes = new Date(year, month + 1, 0).getDate();
  const hoy = new Date();

  for (let i = 0; i < offset; i++) {
    const vacio = document.createElement('div');
    vacio.className = 'dia vacio';
    cal.appendChild(vacio);
  }

  for (let d = 1; d <= diasMes; d++) {
    const key = keyFecha(year, month, d);
    const data = PLAN[key];
    const div = document.createElement('div');
    let cls = 'dia';
    if (data) cls += ' ' + (data.status || 'disponible');
    if (d === hoy.getDate() && month === hoy.getMonth() && year === hoy.getFullYear()) cls += ' hoy';
    if (diaSeleccionado === key) cls += ' selected';
    div.className = cls;

    let statusBadge = '';
    if (data) {
      const sc = data.status === 'disponible' ? 'st-libre' : data.status === 'ss' ? 'st-ss' : 'st-ocupado';
      statusBadge = `<div class="dia-status ${sc}">${data.statusLabel || ''}</div>`;
    }

    let piezasHtml = '';
    if (data && data.piezas) {
      const visible = data.piezas.slice(0, 2);
      visible.forEach(p => {
        piezasHtml += `<div class="pieza-chip ${p.badge}" style="border-left:2px solid ${TYPE_COLORS[p.tipo]||'#888'}">${TYPE_LABELS[p.tipo]||''}: ${p.nombre}</div>`;
      });
      if (data.piezas.length > 2) {
        piezasHtml += `<div class="dia-mas">+${data.piezas.length - 2} más</div>`;
      }
      if (data.stories && data.stories.length) {
        piezasHtml += `<div class="pieza-chip pc-story">📖 ${data.stories.length} stories</div>`;
      }
    }

    div.innerHTML = `
      <div class="dia-header">
        <div class="dia-num">${d}</div>
        ${statusBadge}
      </div>
      <div class="dia-piezas">${piezasHtml}</div>`;

    if (data) div.onclick = () => abrirPanel(key, d, data);
    cal.appendChild(div);
  }
}

function abrirPanel(key, dia, data) {
  diaSeleccionado = key;
  renderCalendario();

  const panel = document.getElementById('panel');
  panel.classList.remove('cerrado');

  const [year, month] = key.split('-').map(Number);
  document.getElementById('ph-fecha').textContent = `${MESES[month-1]} ${year}`;
  document.getElementById('ph-titulo').textContent = `${['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'][new Date(year,month-1,dia).getDay() === 0 ? 6 : new Date(year,month-1,dia).getDay()-1]}, ${dia} de ${MESES[month-1]}`;
  document.getElementById('ph-status').textContent = data.statusLabel || '';

  // TAB CONTENIDO
  let contenidoHtml = `<div class="cta-fijo"><div class="cf-titulo">Elementos fijos en todo post</div><div class="cf-line"><strong>Web:</strong> quintatabachin.com.mx<br><strong>Contacto:</strong> Solo mensajes · WA · FB · IG · No llamadas<br><strong>WA:</strong> wa.me/4641704249<br><strong>Slogan:</strong> "Una sola reserva al día. El espacio es solo tuyo."</div></div>`;

  if (data.piezas && data.piezas.length) {
    data.piezas.forEach((p, i) => {
      const c = p.copy || {};
      const fullCopy = [
        c.hook ? c.hook : '',
        c.cuerpo ? '\n' + c.cuerpo : '',
        c.cierre ? '\n\n' + c.cierre : '',
        c.cta ? '\n\n' + c.cta : '',
        c.hashtags ? '\n\n' + c.hashtags : ''
      ].filter(Boolean).join('');

      contenidoHtml += `
        <div class="pieza-bloque">
          <div class="pb-header" onclick="toggleBloque(this)">
            <span class="pb-tipo-badge pc-${p.tipo}" style="background:${TYPE_COLORS[p.tipo]||'#888'}22;color:${TYPE_COLORS[p.tipo]||'#888'}">${TYPE_LABELS[p.tipo]||p.tipo}</span>
            <span class="pb-nombre">${p.nombre}</span>
            <span class="pb-hora">${p.hora}</span>
            <span class="pb-arrow">▼</span>
          </div>
          <div class="pb-body">
            ${c.hook ? `<div class="copy-seccion"><div class="cs-label">Hook</div><div class="cs-texto hook">${c.hook}</div></div>` : ''}
            ${c.cuerpo ? `<div class="copy-seccion"><div class="cs-label">Cuerpo</div><div class="cs-texto">${c.cuerpo}</div></div>` : ''}
            ${c.cierre ? `<div class="copy-seccion"><div class="cs-label">Cierre · Slogan</div><div class="cs-texto">${c.cierre}</div></div>` : ''}
            ${c.cta ? `<div class="copy-seccion"><div class="cs-label">CTA + Contacto</div><div class="cs-texto cta-box">${c.cta}</div></div>` : ''}
            ${c.hashtags ? `<div class="copy-seccion"><div class="cs-label">Hashtags</div><div class="cs-texto">${c.hashtags}</div></div>` : ''}
            <div class="copy-seccion"><div class="cs-label">Copy completo · listo para pegar</div><div class="copy-full" id="copy-full-${i}">${fullCopy}</div></div>
            <button class="btn-copy" onclick="copiarTexto('copy-full-${i}', this)">📋 Copiar copy completo</button>
          </div>
        </div>`;
    });
  } else {
    contenidoHtml += `<div class="empty-state"><div class="es-icon">📅</div><div class="es-text">Sin publicaciones programadas para este día.</div></div>`;
  }
  document.getElementById('tab-contenido').innerHTML = contenidoHtml;

  // TAB STORIES
  let storiesHtml = '';
  if (data.stories && data.stories.length) {
    storiesHtml += `<div class="nota-diseno"><strong>Regla de oro:</strong> Máx 2 stories de venta consecutivas. Si ayer fue venta, hoy es comunidad. Reposteo UGC siempre inmediato.</div>`;
    data.stories.forEach((s, i) => {
      storiesHtml += `<div class="story-item"><div class="si-num">Story ${i+1}</div><div class="si-texto">${s}</div></div>`;
    });
    storiesHtml += `<div class="nota-diseno" style="margin-top:12px"><strong>Horario sugerido:</strong> Primera story entre 9–10am. Engagement (encuestas) en la tarde 3–6pm. Venta suave en la noche 7–9pm si aplica.</div>`;
  } else {
    storiesHtml = `<div class="empty-state"><div class="es-icon">📖</div><div class="es-text">Sin stories específicas para este día.<br>Publicar contenido de comunidad o repostear UGC si llega.</div></div>`;
  }
  document.getElementById('tab-stories').innerHTML = storiesHtml;

  // TAB ADS
  let adsHtml = '';
  if (data.ads && data.ads.length) {
    data.ads.forEach(a => {
      adsHtml += `<div class="ad-bloque"><div class="ab-nombre">${a.nombre}</div><div class="ab-fechas">${a.fechas}</div><div class="ab-det">${a.det}</div><span class="ab-budget">${a.presupuesto}</span></div>`;
    });
  } else {
    adsHtml = `<div class="empty-state"><div class="es-icon">📣</div><div class="es-text">Sin campaña activa este día.<br>Revisar si hay campaña en curso desde días anteriores.</div></div>`;
  }
  document.getElementById('tab-ads').innerHTML = adsHtml;

  // TAB NOTAS
  let notasHtml = '';
  if (data.piezas) {
    data.piezas.forEach(p => {
      if (p.nota) notasHtml += `<div class="nota-diseno"><strong>${p.nombre}:</strong><br>${p.nota}</div>`;
    });
  }
  notasHtml += `<div class="nota-diseno"><strong>Recordatorio general:</strong><br>• Nunca vender el mismo día de la fecha disponible — mínimo 3 días antes<br>• Reposteo de UGC siempre inmediato cuando llega<br>• Horarios pico IG: Lun 6–9pm · Mié 3–6pm · Dom 6–9pm<br>• No aceptamos llamadas — solo mensajes WA, FB, IG</div>`;
  document.getElementById('tab-notas').innerHTML = notasHtml;

  // Activar primera tab
  activarTab(document.querySelector('.tab.active') || document.querySelector('.tab'), 'contenido');
}

function cerrarPanel() {
  diaSeleccionado = null;
  document.getElementById('panel').classList.add('cerrado');
  renderCalendario();
}

function activarTab(el, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function toggleBloque(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.pb-arrow');
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.pb-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.pb-arrow').forEach(a => { a.classList.remove('open'); });
  if (!isOpen) { body.classList.add('open'); arrow.classList.add('open'); }
}

function copiarTexto(id, btn) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✅ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar copy completo'; btn.classList.remove('copied'); }, 2000);
  });
}

function cambiarMes(dir) {
  mesActual.setMonth(mesActual.getMonth() + dir);
  diaSeleccionado = null;
  document.getElementById('panel').classList.add('cerrado');
  renderCalendario();
}

renderCalendario();
